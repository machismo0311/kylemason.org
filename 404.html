<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Kyle Mason</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='black'/><text x='50' y='72' text-anchor='middle' font-family='Georgia,serif' font-size='48' fill='white'>KM</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #000000; color: #ffffff; min-height: 100vh; font-family: 'Jost', sans-serif; }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 4rem 2rem; opacity: 0; animation: fadeIn 1.8s ease forwards; }
    @keyframes fadeIn { to { opacity: 1; } }
    .code { font-size: clamp(4rem, 15vw, 8rem); font-weight: 200; letter-spacing: 0.2em; color: rgba(255,255,255,0.08); }
    .message { font-size: 0.85rem; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-top: 1rem; }
    a { display: inline-block; margin-top: 2.5rem; font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.25); text-decoration: none; border-bottom: 0.5px solid rgba(255,255,255,0.15); padding-bottom: 2px; transition: color 0.3s; }
    a:hover { color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <div class="code">404</div>
  <div class="message">This page doesn't exist.</div>
  <a href="/">Return</a>
</body>
</html>
